name: Sidecar Binary Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "sidecar/**"
      - ".github/workflows/sidecar-binary.yml"

jobs:
  build-sidecar:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build sidecar binary
        run: python sidecar/scripts/build_sidecar_binary.py

      - name: Upload sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.os }}
          path: |
            sidecar/bin/cortex-sidecar
            sidecar/bin/cortex-sidecar.exe
          if-no-files-found: error
